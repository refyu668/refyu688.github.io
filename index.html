<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Kanto Completionist Tracker</title>
    <style>
        /* === STILE GRAFICO (CSS) === */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
        }

        /* Contenitore Mappa a Sinistra */
        #mappa-container {
            flex: 1; /* Prende tutto lo spazio rimanente */
            overflow: auto; /* Permette lo scorrimento se l'immagine è grande */
            position: relative;
            background-color: #2c2c2c;
            border-right: 2px solid #444;
        }

        /* L'immagine di base di Kanto */
        #mappa-kanto {
            display: block;
            /* Se vuoi ingrandire un po' la mappa di base, scommenta la riga sotto */
            /* transform: scale(1.5); transform-origin: top left; */
        }

        /* I Pallini (Marker) sulla Mappa */
        .marker {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: #ff3b30; /* Colore rosso acceso */
            border: 2px solid white;
            border-radius: 50%; /* Li rende rotondi */
            transform: translate(-50%, -50%); /* Centra il pallino esattamente sulla coordinata */
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
            transition: all 0.2s ease-in-out;
            z-index: 10;
        }

        /* Effetto quando passi sopra col mouse */
        .marker:hover {
            transform: translate(-50%, -50%) scale(1.3);
            z-index: 20;
        }

        /* Stile per un marker quando l'oggetto è stato preso */
        .marker.preso {
            background-color: #4cd964; /* Diventa verde */
            opacity: 0.4; /* Diventa trasparente */
            border-color: #333;
        }

        /* Barra laterale a Destra */
        #sidebar {
            width: 380px; /* Larghezza fissa */
            background-color: #111;
            padding: 20px;
            overflow-y: auto; /* Scroll verticale */
        }

        h2 {
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            color: #ffcc00; /* Giallo Pokémon */
        }

        /* La riga del singolo oggetto nella lista */
        .oggetto-row {
            display: flex;
            align-items: center;
            background-color: #222;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.2s;
        }

        .oggetto-row:hover {
            background-color: #333;
        }

        /* Stile lista quando l'oggetto è preso */
        .oggetto-row.preso {
            opacity: 0.5;
        }
        
        .oggetto-row.preso .nome-oggetto {
            text-decoration: line-through; /* Barra il testo */
            color: #aaa;
        }

        /* Checkbox finto grafico */
        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #555;
            border-radius: 4px;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
        }

        .oggetto-row.preso .checkbox {
            background: #4cd964;
            border-color: #4cd964;
        }

        .oggetto-row.preso .checkbox::after {
            content: "✓";
            color: #111;
            font-weight: bold;
        }

        .icona-oggetto {
            width: 32px;
            height: 32px;
            background-color: #444;
            border-radius: 4px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            text-align: center;
            overflow: hidden;
        }
        
        .icona-oggetto img {
            max-width: 100%;
            max-height: 100%;
        }

        .info-oggetto {
            display: flex;
            flex-direction: column;
        }

        .nome-oggetto {
            font-weight: bold;
            font-size: 16px;
        }

        .categoria-oggetto {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        
        #btn-reset {
            width: 100%;
            padding: 10px;
            background: #ff3b30;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #btn-reset:hover { background: #d32f2f; }
    </style>
</head>
<body>

    <div id="mappa-container">
        <img id="mappa-kanto" src="kanto.png" alt="Mappa di Kanto">
        
        </div>

    <div id="sidebar">
        <h2>Tracker di Kanto</h2>
        <button id="btn-reset">Reset Progressi</button>
        
        <div id="lista-oggetti">
            </div>
    </div>

    <script>
        /* === IL CERVELLO (DATABASE E LOGICA JAVASCRIPT) === */

        // 1. IL NOSTRO DATABASE (Qui aggiungerai tutti gli strumenti in futuro)
        // Ho messo 3 oggetti di prova con coordinate casuali, modificale usando le coordinate che hai trovato con la griglia!
        const databaseOggetti = [
            {
                id: "item_001",
                categoria: "Strumento",
                nome: "Pozione (Biancavilla)",
                x: 230, // Coordinata X in pixel
                y: 800, // Coordinata Y in pixel
                icona: "Pozione.png" // Assicurati di avere l'immagine, altrimenti mostrerà uno spazio vuoto
            },
            {
                id: "item_002",
                categoria: "Bacca",
                nome: "Bacca Ciliegia",
                x: 450,
                y: 600,
                icona: "01 - Bacca Ciliegia.png"
            },
            {
                id: "trainer_001",
                categoria: "Allenatore",
                nome: "Bullo Gianni",
                x: 280,
                y: 400,
                icona: "" // Lasciato vuoto per farti vedere come funziona senza immagine
            }
        ];

        // 2. RECUPERO DEI SALVATAGGI
        // Controlla se l'utente aveva già salvato dei progressi nel browser
        let progressiSalvati = JSON.parse(localStorage.getItem('trackerKantoProgressi')) || {};

        // 3. GENERAZIONE DELL'INTERFACCIA
        const mappaContainer = document.getElementById('mappa-container');
        const listaContainer = document.getElementById('lista-oggetti');

        function renderizzaTutto() {
            // Pulisce prima di renderizzare
            document.querySelectorAll('.marker').forEach(e => e.remove());
            listaContainer.innerHTML = '';

            // Cicla attraverso ogni oggetto nel database
            databaseOggetti.forEach(oggetto => {
                const isPreso = progressiSalvati[oggetto.id] === true;

                // --- CREA IL PALLINO SULLA MAPPA ---
                const marker = document.createElement('div');
                marker.className = `marker ${isPreso ? 'preso' : ''}`;
                marker.style.left = `${oggetto.x}px`;
                marker.style.top = `${oggetto.y}px`;
                marker.title = oggetto.nome; // Mostra il nome al passaggio del mouse
                
                // --- CREA LA RIGA NELLA LISTA ---
                const riga = document.createElement('div');
                riga.className = `oggetto-row ${isPreso ? 'preso' : ''}`;
                
                // Se hai l'icona mostra l'immagine, altrimenti mostra solo le iniziali del nome
                const bloccoIcona = oggetto.icona 
                    ? `<div class="icona-oggetto"><img src="${oggetto.icona}" alt="icona" onerror="this.style.display='none'"></div>` 
                    : `<div class="icona-oggetto">?</div>`;

                riga.innerHTML = `
                    <div class="checkbox"></div>
                    ${bloccoIcona}
                    <div class="info-oggetto">
                        <div class="nome-oggetto">${oggetto.nome}</div>
                        <div class="categoria-oggetto">${oggetto.categoria}</div>
                    </div>
                `;

                // --- LA MAGIA DEL CLICK (Sincronizza mappa e lista) ---
                const toggleStato = () => {
                    // Cambia lo stato (da vero a falso e viceversa)
                    progressiSalvati[oggetto.id] = !progressiSalvati[oggetto.id];
                    // Salva nella memoria del browser
                    localStorage.setItem('trackerKantoProgressi', JSON.stringify(progressiSalvati));
                    // Ricarica la grafica
                    renderizzaTutto();
                };

                marker.addEventListener('click', toggleStato);
                riga.addEventListener('click', toggleStato);

                // Aggiunge gli elementi alla pagina
                mappaContainer.appendChild(marker);
                listaContainer.appendChild(riga);
            });
        }

        // Tasto Reset
        document.getElementById('btn-reset').addEventListener('click', () => {
            if(confirm("Sei sicuro di voler azzerare tutti i progressi?")) {
                progressiSalvati = {};
                localStorage.removeItem('trackerKantoProgressi');
                renderizzaTutto();
            }
        });

        // Avvia il sistema appena si apre la pagina
        renderizzaTutto();

    </script>
</body>
</html>
