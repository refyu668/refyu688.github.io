<script>
        let databaseOggetti = [];
        let progressiSalvati = JSON.parse(localStorage.getItem('trackerKantoProgressi')) || {};
        let filtroCorrente = 'Tutti';

        const mappaContainer = document.getElementById('mappa-container');
        const mapWrapper = document.getElementById('map-wrapper');
        const listaContainer = document.getElementById('lista-oggetti');

        // FUNZIONE DI CARICAMENTO FILE JSON MULTIPLI
        async function inizializzaDatabase() {
            try {
                const [rispostaStrumenti, rispostaPokemon] = await Promise.all([
                    fetch('collezionabili.json').then(res => res.ok ? res.json() : []),
                    fetch('pokemon.json').then(res => res.ok ? res.json() : [])
                ]);
                databaseOggetti = [...rispostaStrumenti, ...rispostaPokemon];
                renderizzaTutto();
            } catch (errore) {
                console.error("Errore nel caricamento dei database JSON:", errore);
            }
        }

        // --------------------------------------------------------
        // NUOVA LOGICA DI ZOOM & TRASCINAMENTO MAPPA
        // --------------------------------------------------------
        let scale = 1, isDragging = false, startX, startY, translateX = 0, translateY = 0;
        
        function applicaTrasformazioni() { 
            mapWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`; 
        }
        
        // Trascinamento (Pan)
        mappaContainer.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('marker') || e.target.closest('.zoom-controls')) return;
            isDragging = true; 
            startX = e.clientX - translateX; 
            startY = e.clientY - translateY;
        });
        
        window.addEventListener('mousemove', (e) => { 
            if (!isDragging) return; 
            translateX = e.clientX - startX; 
            translateY = e.clientY - startY; 
            applicaTrasformazioni(); 
        });
        
        window.addEventListener('mouseup', () => { isDragging = false; });

        // Zoom Fluido
        function eseguiZoom(zoomIn, clientX, clientY) {
            const zoomStep = 1.25; // Fattore moltiplicativo per uno zoom più naturale
            const vecchiaScala = scale;
            
            // Applica il nuovo zoom con limiti espansi (min 0.1, max 5)
            if (zoomIn) {
                scale = Math.min(5, scale * zoomStep);
            } else {
                scale = Math.max(0.1, scale / zoomStep);
            }
            
            // Calcola il punto focale verso cui zoomare
            let focalX, focalY;
            const rect = mappaContainer.getBoundingClientRect();

            if (clientX !== undefined && clientY !== undefined) {
                // Zoom tramite rotellina: focalizzato sul puntatore del mouse
                focalX = clientX - rect.left;
                focalY = clientY - rect.top;
            } else {
                // Zoom tramite pulsanti: focalizzato al centro esatto del container
                focalX = rect.width / 2;
                focalY = rect.height / 2;
            }

            // Aggiusta la traslazione per mantenere fisso il punto focale
            translateX = focalX - (focalX - translateX) * (scale / vecchiaScala);
            translateY = focalY - (focalY - translateY) * (scale / vecchiaScala);
            
            applicaTrasformazioni();
        }

        // Event Listeners per lo Zoom
        document.getElementById('zoom-in').addEventListener('click', () => eseguiZoom(true));
        document.getElementById('zoom-out').addEventListener('click', () => eseguiZoom(false));
        mappaContainer.addEventListener('wheel', (e) => { 
            e.preventDefault(); 
            eseguiZoom(e.deltaY < 0, e.clientX, e.clientY); 
        }, { passive: false });

        // TOOL COORDINATE SULLA CONSOLE
        mappaContainer.addEventListener('click', (e) => {
            if (e.target.classList.contains('marker') || e.target.closest('.zoom-controls')) return;
            const rect = mapWrapper.getBoundingClientRect();
            const xReale = Math.round((e.clientX - rect.left) / scale);
            const yReale = Math.round((e.clientY - rect.top) / scale);
            console.log(`{ "id": "poke_XXX", "categoria": "Pokémon", "nome": "NOME", "x": ${xReale}, "y": ${yReale}, "sprite": "XXX.png" },`);
        });

        // --------------------------------------------------------
        // LOGICA DEI FILTRI E RENDERING
        // --------------------------------------------------------
        function cambiaFiltro(nuovoFiltro) {
            filtroCorrente = nuovoFiltro;
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                if(btn.textContent === nuovoFiltro || (nuovoFiltro === 'Tutti' && btn.textContent === 'Tutti')) {
                    btn.classList.add('attivo');
                } else {
                    btn.classList.remove('attivo');
                }
            });
            renderizzaTutto();
        }

        function renderizzaTutto() {
            document.querySelectorAll('.marker').forEach(e => e.remove());
            listaContainer.innerHTML = '';

            databaseOggetti.forEach(oggetto => {
                if (filtroCorrente !== 'Tutti' && oggetto.categoria !== filtroCorrente) return;

                const isPreso = progressiSalvati[oggetto.id] === true;

                const contenutoIcona = oggetto.sprite 
                    ? `<img src="${oggetto.sprite}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'24\' height=\'24\'><text y=\'20\' font-size=\'20\'>❓</text></svg>'">` 
                    : oggetto.emoji || "🎒";

                let classeCategoria = '';
                if(oggetto.categoria === "Oggetto Nascosto") classeCategoria = 'nascosto';
                if(oggetto.categoria === "Macchina Tecnica") classeCategoria = 'macchina';
                if(oggetto.categoria === "Pokémon") classeCategoria = 'pokemon';

                const marker = document.createElement('div');
                marker.className = `marker ${classeCategoria} ${isPreso ? 'preso' : ''}`;
                marker.style.left = `${oggetto.x}px`;
                marker.style.top = `${oggetto.y}px`;
                marker.innerHTML = contenutoIcona;
                marker.title = oggetto.nome;

                if (oggetto.x === 0 && oggetto.y === 0) {
                    marker.style.display = 'none';
                }
                
                const riga = document.createElement('div');
                riga.className = `oggetto-row ${isPreso ? 'preso' : ''}`;
                riga.innerHTML = `
                    <div class="checkbox"></div>
                    <div class="icona-oggetto">${contenutoIcona}</div>
                    <div class="info-oggetto">
                        <div class="nome-oggetto">${oggetto.nome}</div>
                        <div class="categoria-oggetto">${oggetto.categoria} ${oggetto.x !== 0 ? `(${oggetto.x}, ${oggetto.y})` : '(Non Mappato)'}</div>
                    </div>
                `;

                const toggleStato = () => {
                    progressiSalvati[oggetto.id] = !progressiSalvati[oggetto.id];
                    localStorage.setItem('trackerKantoProgressi', JSON.stringify(progressiSalvati));
                    renderizzaTutto();
                };

                marker.addEventListener('click', toggleStato);
                riga.addEventListener('click', toggleStato);

                mapWrapper.appendChild(marker);
                listaContainer.appendChild(riga);
            });
        }

        document.getElementById('btn-reset').addEventListener('click', () => {
            if(confirm("Azzerare tutti i progressi salvati?")) {
                progressiSalvati = {}; localStorage.removeItem('trackerKantoProgressi'); renderizzaTutto();
            }
        });

        inizializzaDatabase();
    </script>
