<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanto Completionist Tracker - Zoom & Pan</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
            user-select: none; /* Impedisce la selezione del testo fastidiosa mentre si trascina la mappa */
        }

        /* AREA MAPPA (A SINISTRA) */
        #mappa-container {
            flex: 1;
            overflow: hidden; /* Gestiamo lo scroll noi via codice per il trascinamento */
            position: relative;
            background-color: #252525;
            cursor: grab; /* Icona a manina per far capire che si può trascinare */
        }

        #mappa-container:active {
            cursor: grabbing; /* Manina chiusa quando trascini */
        }

        /* Il Guscio che contiene mappa e marker e che viene zoomato/spostato */
        #map-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0; /* Lo zoom parte dall'angolo in alto a sinistra */
            will-change: transform;
        }

        #mappa-kanto {
            display: block;
            max-width: none;
            pointer-events: none; /* Impedisce al browser di trascinare l'immagine come file */
        }

        /* I CONTROLLI DELLO ZOOM (+ e - sulla mappa) */
        .zoom-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            background-color: rgba(17, 17, 17, 0.85);
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: 0.2s;
        }

        .zoom-btn:hover {
            background-color: #ff3b30;
            border-color: #ff3b30;
        }

        /* MARKER (PALLINI) */
        .marker {
            position: absolute;
            width: 28px;
            height: 28px;
            background-color: #ff3b30;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.7);
            transition: background-color 0.2s, opacity 0.2s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .marker.preso {
            background-color: #4cd964 !important;
            opacity: 0.3;
            border-color: #111;
        }

        /* BARRA LATERALE (A DESTRA) */
        #sidebar {
            width: 380px;
            min-width: 380px;
            background-color: #111;
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
            border-left: 2px solid #444;
            z-index: 10;
        }

        h2 {
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            color: #ffcc00;
        }

        .oggetto-row {
            display: flex;
            align-items: center;
            background-color: #222;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.2s;
        }

        .oggetto-row:hover { background-color: #333; }
        .oggetto-row.preso { opacity: 0.4; }
        .oggetto-row.preso .nome-oggetto { text-decoration: line-through; color: #aaa; }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #555;
            border-radius: 4px;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            flex-shrink: 0;
        }

        .oggetto-row.preso .checkbox { background: #4cd964; border-color: #4cd964; }
        .oggetto-row.preso .checkbox::after { content: "✓"; color: #111; font-weight: bold; }

        .icona-oggetto {
            width: 32px;
            height: 32px;
            background-color: #444;
            border-radius: 4px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .info-oggetto { display: flex; flex-direction: column; }
        .nome-oggetto { font-weight: bold; font-size: 15px; }
        .categoria-oggetto { font-size: 12px; color: #888; margin-top: 4px; }
        
        #btn-reset {
            width: 100%;
            padding: 10px;
            background: #ff3b30;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="mappa-container">
        <div class="zoom-controls">
            <button class="zoom-btn" id="zoom-in">+</button>
            <button class="zoom-btn" id="zoom-out">−</button>
        </div>
        
        <div id="map-wrapper">
            <img id="mappa-kanto" src="kanto.png" alt="Mappa di Kanto">
            </div>
    </div>

    <div id="sidebar">
        <h2>Tracker di Kanto</h2>
        <button id="btn-reset">Reset Progressi</button>
        <div id="lista-oggetti"></div>
    </div>

    <script>
        // DATABASE OGGETTI (Sempre modificabili con le tue coordinate reali)
        const databaseOggetti = [
            { id: "item_001", categoria: "Strumento", nome: "Pozione (Biancavilla)", x: 230, y: 840, emoji: "🎒" },
            { id: "item_002", categoria: "Bacca", nome: "Bacca Ciliegia (Percorso 3)", x: 520, y: 240, emoji: "🍒" },
            { id: "trainer_001", categoria: "Allenatore", nome: "Bullo Gianni", x: 440, y: 350, emoji: "⚔️" }
        ];

        let progressiSalvati = JSON.parse(localStorage.getItem('trackerKantoProgressi')) || {};
        const mappaContainer = document.getElementById('mappa-container');
        const mapWrapper = document.getElementById('map-wrapper');
        const listaContainer = document.getElementById('lista-oggetti');

        // VARIABLES PER ZOOM E TRASCINAMENTO (PAN)
        let scale = 1;
        const MIN_SCALE = 0.4;
        const MAX_SCALE = 3;
        let isDragging = false;
        let startX, startY;
        let translateX = 0, translateY = 0;

        // Funzione per aggiornare graficamente la posizione e lo zoom del wrapper mappa
        function applicaTrasformazioni() {
            mapWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        // === LOGICA DI TRASCINAMENTO (PAN) ===
        mappaContainer.addEventListener('mousedown', (e) => {
            // Si attiva il trascinamento solo se non si clicca su un marker o pulsante
            if (e.target.classList.contains('marker') || e.target.classList.contains('zoom-btn')) return;
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            applicaTrasformazioni();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // === LOGICA DI ZOOM (PULSANTI E ROTELLA) ===
        function eseguiZoom(zoomIn,clientX, clientY) {
            const zoomFactor = 0.15
