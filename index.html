<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanto Completionist Tracker</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
        }

        /* Contenitore Mappa a Sinistra */
        #mappa-container {
            flex: 1;
            overflow: auto;
            position: relative;
            background-color: #333; /* Grigio di sfondo se l'immagine carica lentamente */
            min-width: 600px;
        }

        /* L'immagine di base di Kanto */
        #mappa-kanto {
            display: block;
            max-width: none; /* Impedisce al browser di rimpicciolire la mappa */
        }

        /* I Pallini (Marker) sulla Mappa */
        .marker {
            position: absolute;
            width: 28px;
            height: 28px;
            background-color: #ff3b30;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.7);
            transition: all 0.2s ease-in-out;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px; /* Dimensione dell'emoji dentro il pallino */
        }

        .marker:hover {
            transform: translate(-50%, -50%) scale(1.3);
            z-index: 20;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* Quando l'oggetto è stato preso */
        .marker.preso {
            background-color: #4cd964 !important;
            opacity: 0.3;
            border-color: #111;
        }

        /* Barra laterale a Destra */
        #sidebar {
            width: 380px;
            min-width: 380px;
            background-color: #111;
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
            border-left: 2px solid #444;
        }

        h2 {
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            color: #ffcc00;
        }

        .oggetto-row {
            display: flex;
            align-items: center;
            background-color: #222;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.2s;
        }

        .oggetto-row:hover {
            background-color: #333;
        }

        .oggetto-row.preso {
            opacity: 0.4;
        }
        
        .oggetto-row.preso .nome-oggetto {
            text-decoration: line-through;
            color: #aaa;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #555;
            border-radius: 4px;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            flex-shrink: 0;
        }

        .oggetto-row.preso .checkbox {
            background: #4cd964;
            border-color: #4cd964;
        }

        .oggetto-row.preso .checkbox::after {
            content: "✓";
            color: #111;
            font-weight: bold;
        }

        .icona-oggetto {
            width: 32px;
            height: 32px;
            background-color: #444;
            border-radius: 4px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .info-oggetto {
            display: flex;
            flex-direction: column;
        }

        .nome-oggetto {
            font-weight: bold;
            font-size: 15px;
        }

        .categoria-oggetto {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        
        #btn-reset {
            width: 100%;
            padding: 10px;
            background: #ff3b30;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #btn-reset:hover { background: #d32f2f; }
    </style>
</head>
<body>

    <div id="mappa-container">
        <img id="mappa-kanto" src="kanto.png" alt="Caricamento mappa in corso... Assicurati che kanto.png sia in questa cartella.">
    </div>

    <div id="sidebar">
        <h2>Tracker di Kanto</h2>
        <button id="btn-reset">Reset Progressi</button>
        <div id="lista-oggetti"></div>
    </div>

    <script>
        // DATI DI TEST (Usa le coordinate lette dalla tua mappa con la griglia!)
        // Ho aggiunto un'emoji simbolica per far funzionare la grafica anche senza file .png esterni
        const databaseOggetti = [
            {
                id: "item_001",
                categoria: "Strumento",
                nome: "Pozione (Biancavilla)",
                x: 230, 
                y: 840, 
                emoji: "🎒"
            },
            {
                id: "item_002",
                categoria: "Bacca",
                nome: "Bacca Ciliegia (Percorso 3)",
                x: 520,
                y: 240,
                opacity: 1,
                emoji: "🍒"
            },
            {
                id: "trainer_001",
                categoria: "Allenatore",
                nome: "Bullo Gianni",
                x: 440,
                y: 350,
                emoji: "⚔️"
            }
        ];

        let progressiSalvati = JSON.parse(localStorage.getItem('trackerKantoProgressi')) || {};
        const mappaContainer = document.getElementById('mappa-container');
        const listaContainer = document.getElementById('lista-oggetti');

        function renderizzaTutto() {
            // Rimuove i vecchi marker per non duplicarli
            document.querySelectorAll('.marker').forEach(e => e.remove());
            listaContainer.innerHTML = '';

            databaseOggetti.forEach(oggetto => {
                const isPreso = progressiSalvati[oggetto.id] === true;

                // 1. Crea il marker sulla mappa
                const marker = document.createElement('div');
                marker.className = `marker ${isPreso ? 'preso' : ''}`;
                marker.style.left = `${oggetto.x}px`;
                marker.style.top = `${oggetto.y}px`;
                marker.innerHTML = oggetto.emoji; // Inserisce l'emoji nel cerchio
                marker.title = oggetto.nome;
                
                // 2. Crea l'elemento nella lista laterale
                const riga = document.createElement('div');
                riga.className = `oggetto-row ${isPreso ? 'preso' : ''}`;
                riga.innerHTML = `
                    <div class="checkbox"></div>
                    <div class="icona-oggetto">${oggetto.emoji}</div>
                    <div class="info-oggetto">
                        <div class="nome-oggetto">${oggetto.nome}</div>
                        <div class="categoria-oggetto">${oggetto.categoria} (X: ${oggetto.x}, Y: ${oggetto.y})</div>
                    </div>
                `;

                // Interattività al click
                const toggleStato = () => {
                    progressiSalvati[oggetto.id] = !progressiSalvati[oggetto.id];
                    localStorage.setItem('trackerKantoProgressi', JSON.stringify(progressiSalvati));
                    renderizzaTutto();
                };

                marker.addEventListener('click', toggleStato);
                riga.addEventListener('click', toggleStato);

                mappaContainer.appendChild(marker);
                listaContainer.appendChild(riga);
            });
        }

        document.getElementById('btn-reset').addEventListener('click', () => {
            if(confirm("Azzerare tutti i progressi?")) {
                progressiSalvati = {};
                localStorage.removeItem('trackerKantoProgressi');
                renderizzaTutto();
            }
        });

        // Avvio iniziale
        renderizzaTutto();
    </script>
</body>
</html>
